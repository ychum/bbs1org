services:
  php:
    image: php:8-fpm-bookworm
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - data:/var/www/html/data
      - avatars:/var/www/html/avatars
      - ./docker/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - avatars:/var/www/html/avatars:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  data:
  avatars:
