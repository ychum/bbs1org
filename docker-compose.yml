services:
  php:
    image: php:8-fpm-bookworm
    restart: unless-stopped
    working_dir: /var/www/html
    command: >-
      sh -c "mkdir -p data cache avatars upload plugins &&
      chown www-data:www-data /var/www/html index.* install.php update.php &&
      chown -R www-data:www-data data cache avatars upload plugins &&
      exec php-fpm"
    volumes:
      - ./:/var/www/html
      - data:/var/www/html/data
      - avatars:/var/www/html/avatars
      - upload:/var/www/html/upload
      - plugins:/var/www/html/plugins
      - ./docker/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - avatars:/var/www/html/avatars:ro
      - upload:/var/www/html/upload:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  data:
  avatars:
  upload:
  plugins:
